# api.nl360.site — WordPress (headless backend)
# Solo expone la REST API, wp-admin y media. No sirve el frontend público de WP.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.nl360.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.nl360.site;

    ssl_certificate     /etc/letsencrypt/live/api.nl360.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nl360.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tamaño máximo de upload (sincronizar con uploads.ini de PHP)
    client_max_body_size 64M;

    # --- REST API (consumida por escritorio / Next.js) ---
    location /wp-json/ {
        proxy_pass         http://wordpress:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS: permite peticiones desde el frontend
        add_header Access-Control-Allow-Origin  "https://nl360.site" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # --- Archivos subidos (imágenes, documentos, etc.) ---
    location /wp-content/uploads/ {
        proxy_pass       http://wordpress:80;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        add_header       Cache-Control   "public, max-age=2592000";
    }

    # --- Otros assets de WordPress (CSS/JS de temas/plugins) ---
    location /wp-content/ {
        proxy_pass       http://wordpress:80;
        proxy_set_header Host $host;
    }

    location /wp-includes/ {
        proxy_pass       http://wordpress:80;
        proxy_set_header Host $host;
    }

    # --- Panel de administración ---
    location /wp-admin/ {
        proxy_pass         http://wordpress:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Opcional: restringir acceso al admin por IP
        # allow 0.0.0.0/0;  # reemplazar con tu IP
        # deny all;
    }

    location = /wp-login.php {
        proxy_pass         http://wordpress:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /wp-cron.php {
        proxy_pass         http://wordpress:80;
        proxy_set_header   Host $host;
        deny all;
    }

    # --- Bloquear el frontend público de WordPress ---
    # El sitio principal es nl360.site (Next.js), WP no sirve páginas.
    location / {
        return 403 "WordPress backend — no public frontend.";
    }
}
