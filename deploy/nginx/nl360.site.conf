# nl360.site — sitio principal (escritorio / Next.js)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name nl360.site www.nl360.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nl360.site$request_uri;
    }
}

# www → apex redirect
server {
    listen 443 ssl;
    server_name www.nl360.site;

    ssl_certificate     /etc/letsencrypt/live/nl360.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nl360.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nl360.site$request_uri;
}

# Sitio principal
server {
    listen 443 ssl;
    server_name nl360.site;

    ssl_certificate     /etc/letsencrypt/live/nl360.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nl360.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Archivos estáticos de Next.js con cache
    location /_next/static/ {
        proxy_pass http://escritorio:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Todo lo demás → escritorio (Next.js)
    location / {
        proxy_pass         http://escritorio:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
